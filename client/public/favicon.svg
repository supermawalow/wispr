<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12103a"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </linearGradient>
    <linearGradient id="cl" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#c568ff"/>
      <stop offset="50%" stop-color="#9b30e8"/>
      <stop offset="100%" stop-color="#7010c0"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Cloud: left blob -->
  <circle cx="32" cy="52" r="18" fill="url(#cl)"/>
  <!-- Cloud: right blob -->
  <circle cx="68" cy="52" r="18" fill="url(#cl)"/>
  <!-- Cloud: left top -->
  <circle cx="36" cy="42" r="15" fill="url(#cl)"/>
  <!-- Cloud: right top -->
  <circle cx="64" cy="42" r="15" fill="url(#cl)"/>
  <!-- Cloud: center top -->
  <circle cx="50" cy="38" r="13" fill="url(#cl)"/>
  <!-- Cloud: bottom fill -->
  <rect x="14" y="52" width="72" height="20" rx="4" fill="url(#cl)"/>
  <!-- Gloss -->
  <ellipse cx="40" cy="40" rx="14" ry="8" fill="rgba(255,255,255,0.25)"/>
  <!-- W -->
  <polyline points="26,42 34,62 50,50 66,62 74,42"
    fill="none" stroke="#3a0080" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="26,42 34,62 50,50 66,62 74,42"
    fill="none" stroke="#1a0050" stroke-width="4.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>